---
order: 1
has_canvas: true
title: Welcome
drawing_config: traversal_pen_control
---

<script>
window.drawingConfigs = [
{% for config in site.data.drawing_configs %}
  {
    "key": "{{ config[0] }}",
    "svg_file": "{{ config[1].svg_file }}",
    "speed": {{ config[1].speed | default: 50 }},
    "resolution": {{ config[1].resolution | default: 10000 }},
    "scale": {{ config[1].scale | default: 1.0 }},
    "linewidth": {{ config[1].linewidth | default: 1 }},
    "circles": {{ config[1].circles | default: 1000 }},
    "max_freq": {{ config[1].max_freq | default: 2000 }},
    "max_circle_size": {{ config[1].max_circle_size | default: 1000000 }},
    "axis_mode": "{{ config[1].axis_mode | default: 'two_true' }}",
    "rotation_mode": "{{ config[1].rotation_mode | default: 'fixed' }}",
    "offset_x": {{ config[1].offset_x | default: 0 }},
    "offset_y": {{ config[1].offset_y | default: 0 }},
    "global_offset_x": {{ config[1].global_offset_x | default: 0 }},
    "global_offset_y": {{ config[1].global_offset_y | default: 0 }},
    "loop_delay": {{ config[1].loop_delay | default: 0 }}
  }{% unless forloop.last %},{% endunless %}
{% endfor %}
];
window.activeDrawingConfig = "{{ page.drawing_config }}";
</script>

<div class="input-controls">
    <button id="useKCBtn" class="active">Use KC</button>
    <button id="drawBtn">Draw</button>
    <input type="file" id="svgUpload" accept=".svg" style="display: none;">
    <button id="uploadBtn">Upload SVG</button>
    <button id="clearBtn" style="display: none;">Clear Drawing</button>
</div>

<canvas id="referenceCanvas" style="display: none;"></canvas>
{% assign cfg = site.data.drawing_configs[page.drawing_config] %}
<canvas id="sketchCanvas" data-svg-file="{{ cfg.svg_file }}" data-speed="{{ cfg.speed }}" data-resolution="{{ cfg.resolution }}" data-scale="{{ cfg.scale }}" data-linewidth="{{ cfg.linewidth }}" data-circles="{{ cfg.circles }}" data-max-freq="{{ cfg.max_freq }}" data-max-circle-size="{{ cfg.max_circle_size }}" data-axis-mode="{{ cfg.axis_mode }}" data-rotation-mode="{{ cfg.rotation_mode }}" data-offset-x="{{ cfg.offset_x }}" data-offset-y="{{ cfg.offset_y }}" data-global-offset-x="{{ cfg.global_offset_x }}" data-global-offset-y="{{ cfg.global_offset_y }}" data-loop-delay="{{ cfg.loop_delay }}"></canvas>

<div class="screen-content">
    <h1 class="typing-text">Hi I'm Ken</h1>
    <h5><span class="email-text">kenc at cs dot toronto dot edu</span></h5>
    <div class="social-links-row">
        <button class="drawing-config-arrow" id="drawingConfigPrev" aria-label="Previous drawing">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
        </button>
        <div class="social-links">
        <a href="https://linkedin.com/in/kenneth-christofferson" target="_blank" class="social-link" aria-label="LinkedIn Profile">
