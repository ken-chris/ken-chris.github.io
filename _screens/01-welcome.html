order: 1
has_canvas: true
title: Welcome
drawing_config: traversal_pen_control

<div class="input-controls">
    <button id="useKCBtn" class="active">Use KC</button>
    <button id="drawBtn">Draw</button>
    <input type="file" id="svgUpload" accept=".svg" style="display: none;">
    <button id="uploadBtn">Upload SVG</button>
    <button id="clearBtn" style="display: none;">Clear Drawing</button>
</div>

<canvas id="referenceCanvas" style="display: none;"></canvas>
{% assign cfg = site.data.drawing_configs[page.drawing_config] %}
